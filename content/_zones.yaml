  - from: "delivery"
    to: "kubernetes"
  - from: "containers"
    to: "kubernetes"
  - from: "kubernetes"
    to: "kubernetes-production"
  - from: "kubernetes-production"
    to: "observability"
  - from: "kubernetes-production"
    to: "sre"
  - from: "observability"
    to: "sre"
