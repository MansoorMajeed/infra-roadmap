zones:
  - id: "foundations"
    title: "Foundations: Code & Computers"
    coreQuestion: "What even is code?"
    description: "Start from zero. Understand what code is, how computers execute it, and learn the essential tools every engineer uses daily."
    color: "#10b981"
    position: { x: 0, y: 0 }
    active: true

  - id: "building"
    title: "Building Real Software"
    coreQuestion: "Let me build something real"
    description: "Go from scripts to real applications. Learn about web services, databases, APIs, and the architecture that holds it all together."
    color: "#3b82f6"
    position: { x: 400, y: 0 }
    active: true

  - id: "networking"
    title: "Networks & The Internet"
    coreQuestion: "How do I put it on the internet?"
    description: "Understand how data travels across networks — protocols, addressing, routing, and encryption fundamentals."
    color: "#8b5cf6"
    position: { x: 800, y: 0 }
    active: true

  - id: "running"
    title: "Running Your Application"
    coreQuestion: "How do I actually run this thing?"
    description: "Go from understanding networks to actually running your app on a real server — servers, cloud, DNS, HTTPS, and a live deployment."
    color: "#f97316"
    position: { x: 400, y: 350 }
    active: true

  - id: "scaling"
    title: "Scale & Reliability"
    coreQuestion: "More users are coming"
    description: "One server isn't enough. Learn about load balancing, replication, CDNs, and the fundamentals of distributed systems."
    color: "#f59e0b"
    position: { x: 0, y: 750 }
    active: true

  - id: "delivery"
    title: "Delivery & Automation"
    coreQuestion: "Deploying manually is painful"
    description: "CI/CD pipelines, Infrastructure as Code, and automated deployments. Automate everything around your servers — testing, building, and shipping code without touching them by hand."
    color: "#ef4444"
    position: { x: 400, y: 750 }
    active: true

  - id: "containers"
    title: "Containers"
    coreQuestion: "How do I package and ship my application?"
    description: "Containerize your application with Docker, build images in CI, store them in a registry, and run them on a server. The foundation everything above it depends on."
    color: "#14b8a6"
    position: { x: 800, y: 1150 }
    active: true

  - id: "kubernetes"
    title: "Kubernetes"
    coreQuestion: "How do I run containers at scale?"
    description: "From pods to production. Learn how Kubernetes works, how to deploy and operate applications on it, and build a solid mental model before taking it to production."
    color: "#6366f1"
    position: { x: 200, y: 1150 }
    active: true

  - id: "kubernetes-production"
    title: "Kubernetes in Production"
    coreQuestion: "How do I run Kubernetes for real workloads?"
    description: "Take Kubernetes to production. Helm, GitOps with ArgoCD, CI/CD pipelines for containers, multi-environment promotion, and secrets management."
    color: "#a855f7"
    position: { x: 400, y: 1550 }
    active: true

  - id: "observability"
    title: "Observability & Security"
    coreQuestion: "How do I know it's healthy?"
    description: "Logging, metrics, tracing, alerting. Plus security fundamentals - secrets management, IAM, and compliance."
    color: "#06b6d4"
    position: { x: 0, y: 1950 }
    active: true

  - id: "sre"
    title: "SRE"
    coreQuestion: "How do I do this professionally?"
    description: "SRE philosophy, SLOs, incident management, chaos engineering, and building platforms that other engineers love."
    color: "#ec4899"
    position: { x: 500, y: 1950 }
    active: true

  - id: "self-hosting"
    title: "Self-Hosting"
    coreQuestion: "I want to run my own services"
    description: "Spin up your own file sync, media server, smart home hub, and more — on hardware you own and control. Privacy by default, no subscriptions, and a rabbit hole that never ends."
    color: "#0ea5e9"
    position: { x: 850, y: 750 }
    active: true

zoneEdges:
  - from: "foundations"
    to: "building"
  - from: "building"
    to: "networking"
  - from: "networking"
    to: "running"
  - from: "running"
    to: "scaling"
  - from: "running"
    to: "delivery"
  - from: "running"
    to: "self-hosting"
  - from: "scaling"
